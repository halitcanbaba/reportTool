name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      #--- Tenant dropdown. The `options` list MUST stay in sync with
      #--- `.github/tenants.json`: when a new tenant is added there, append
      #--- its `instance` name here too so it appears in the manual deploy
      #--- dropdown. `all` triggers a fan-out across every entry in
      #--- tenants.json (same as a push event).
      #--- For brand-new bootstraps, just type the name into a manual run
      #--- after adding the entry to tenants.json (since `choice` won't let
      #--- you type a value that isn''t in the list, you must add the option
      #--- here first OR temporarily flip this back to `type: string`).
      instance:
        description: 'Tenant: `all` = TÜMÜ (tenants.json), aksi halde SADECE seçilen.'
        type: choice
        required: false
        default: all
        options:
          - all
          - default
      first_time_install:
        description: 'İlk kurulum (install root + service oluştur, server.json render, backup atla). instance + port_offset zorunlu.'
        type: boolean
        required: false
        default: false
      port_offset:
        description: 'Port offset (backend=5151+N, frontend=8080+N). Sadece first_time_install için kullanılır; mevcut tenant''larda tenants.json''daki değer kazanır.'
        required: false
        default: '0'

concurrency:
  group: deploy-prod
  cancel-in-progress: false

#--- The bump step pushes a new commit + tag back to main, so the workflow
#--- needs write access to the repository contents.
permissions:
  contents: write

jobs:
  deploy:
    runs-on: [self-hosted, Windows, X64, production, reportTool]
    env:
      MT5_DLL_SOURCE: C:\MetaTrader5SDK\Libs\MT5APIManager64.dll
      NSSM:           C:\ReportTool\bin\nssm.exe
      NGINX_DIR:      C:\tools\nginx-1.29.8
      NGINX_SVC:      nginx
      SITES_ROOT:     C:\nginx-sites

    steps:
      #--- Full history + persisted token so the auto-bump step below can
      #--- commit + tag + push back to main. fetch-depth: 0 also keeps
      #--- `git describe` / tag-aware tooling happy if added later.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}

      #--- Auto-bump patch version on every successful main deploy.
      #--- - Reads frontend/package.json (the single source of truth).
      #--- - PATCH-only increment (1.0.0 -> 1.0.1 -> 1.0.2 ...). Manually edit
      #---   the file for MAJOR/MINOR bumps.
      #--- - Updates the same string in backend/.../HealthRoutes.cpp so the
      #---   /health endpoint reports the matching number.
      #--- - Commits with [skip ci] so this commit itself doesn't trigger
      #---   another workflow run.
      #--- - Tags vX.Y.Z and pushes both. Loop guard: skip if the head commit
      #---   is already a release bump (chore(release): subject prefix).
      - name: Bump version + tag
        id: bump
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $headSubject = git log -1 --pretty=%s
          #--- PowerShell `-like` treats `[ ]` as a character class, so the
          #--- pattern `*[skip ci]*` matches any string containing s/k/i/p/space/c
          #--- (essentially every commit message). Use `.Contains()` for exact
          #--- substring match instead.
          if ($headSubject -like 'chore(release):*' -or $headSubject.Contains('[skip ci]')) {
            Write-Host "Head commit is a release / skip-ci commit; nothing to bump."
            "skipped=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            return
          }

          $pkgPath = 'frontend/package.json'
          $pkg = Get-Content $pkgPath -Raw | ConvertFrom-Json
          $cur = [string]$pkg.version
          if ($cur -notmatch '^(\d+)\.(\d+)\.(\d+)$') {
            throw "package.json version '$cur' is not MAJOR.MINOR.PATCH"
          }
          $major = [int]$Matches[1]; $minor = [int]$Matches[2]; $patch = [int]$Matches[3] + 1
          $next  = "$major.$minor.$patch"
          Write-Host "Bumping $cur -> $next"

          #--- package.json: rewrite using regex to preserve formatting/order
          #--- (ConvertTo-Json reformats and reorders keys, which we don't want).
          $pkgText = Get-Content $pkgPath -Raw
          $pkgNew  = [regex]::Replace($pkgText, '"version"\s*:\s*"\d+\.\d+\.\d+"', '"version": "' + $next + '"', 1)
          [System.IO.File]::WriteAllText($pkgPath, $pkgNew)

          #--- HealthRoutes.cpp: same string surgery for the /health response.
          $hrPath = 'backend/ReportTool/api/HealthRoutes.cpp'
          $hrText = Get-Content $hrPath -Raw
          $hrNew  = [regex]::Replace($hrText,
              '("version"\s*,\s*)"\d+\.\d+\.\d+"',
              '$1"' + $next + '"', 1)
          [System.IO.File]::WriteAllText($hrPath, $hrNew)

          #--- Commit + tag + push. [skip ci] in the commit subject prevents
          #--- the resulting push event from re-triggering this workflow.
          git config user.email 'actions@github.com'
          git config user.name  'github-actions[bot]'
          git add $pkgPath $hrPath
          #--- `git diff --cached --quiet` exits 0 when there are NO staged
          #--- changes, 1 when there are. PowerShell 5.1 can't inline that
          #--- inside an `if (...)` parenthesised subexpression -- run it as a
          #--- separate statement then inspect $LASTEXITCODE.
          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) {
            Write-Host "No version changes to commit (already at $next?)."
            "skipped=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            return
          }
          git commit -m "chore(release): v$next [skip ci]"
          git tag "v$next"
          git push origin "HEAD:${{ github.ref_name }}"
          git push origin "v$next"

          "version=$next"   | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "skipped=false"   | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      #--- Resolve the tenant fan-out list + the single-instance parameters
      #--- (used by bootstrap steps that target one new tenant at a time).
      #---
      #--- Sources:
      #---   * push event                      -> ALL tenants in .github/tenants.json
      #---   * workflow_dispatch with instance -> ONLY that tenant; falls back to
      #---     a synthetic entry (instance + port_offset from inputs) when the
      #---     instance isn't yet in tenants.json -- this is how first_time_install
      #---     bootstraps a brand-new tenant before it's been registered.
      - name: Resolve instance parameters
        id: cfg
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'

          $tenantsPath = '.github/tenants.json'
          if (-not (Test-Path $tenantsPath)) {
            throw "tenants list missing: $tenantsPath"
          }
          $tenants = Get-Content $tenantsPath -Raw | ConvertFrom-Json
          if ($tenants -isnot [array]) { $tenants = @($tenants) }

          $inputInstance = '${{ github.event.inputs.instance }}'
          $inputOffsetRaw = '${{ github.event.inputs.port_offset }}'
          $firstInstall = '${{ github.event.inputs.first_time_install }}' -eq 'true'

          #--- Three input modes (both push + workflow_dispatch route through here):
          #---   * empty / 'all'  -> fan-out to every tenant in tenants.json
          #---   * known instance -> only that tenant (offset from tenants.json)
          #---   * unknown name   -> synthetic single tenant for first_time_install
          $isFanOut = [string]::IsNullOrWhiteSpace($inputInstance) -or ($inputInstance -eq 'all')
          if (-not $isFanOut) {
            $instance = $inputInstance.ToLower() -replace '[^a-z0-9_-]',''
            if ([string]::IsNullOrWhiteSpace($instance)) { throw "instance name invalid" }
            $picked = $tenants | Where-Object { $_.instance -eq $instance } | Select-Object -First 1
            if (-not $picked) {
              #--- Synthetic tenant from workflow_dispatch inputs (first_time_install path).
              if ([string]::IsNullOrWhiteSpace($inputOffsetRaw)) { $inputOffsetRaw = '0' }
              $offset = [int]$inputOffsetRaw
              if ($offset -lt 0 -or $offset -gt 900) { throw "port_offset out of range (0..900)" }
              $picked = [pscustomobject]@{ instance = $instance; port_offset = $offset }
            }
            $deployList = @($picked)
          } else {
            $deployList = $tenants
          }

          if ($deployList.Count -eq 0) { throw "no tenants to deploy" }

          #--- Output: JSON array consumed by the deploy-fan-out step below.
          $deployJson = ($deployList | ConvertTo-Json -Compress -Depth 4)
          if ($deployList.Count -eq 1) { $deployJson = "[$deployJson]" }

          #--- Pick a "single-tenant view" used by bootstrap-only steps. When
          #--- the fan-out is multi-tenant (push event), bootstrap steps skip
          #--- (first_install == 'false') so these values are unused.
          $first = $deployList[0]
          $instance = $first.instance
          $offset = [int]$first.port_offset
          $suffix = if ($instance -eq 'default') { '' } else { "-$instance" }
          $installRoot = "C:\ReportTool$suffix"
          $serviceName = "ReportTool$suffix"
          $siteName = "reporttool-$instance"
          $siteDir = "$env:SITES_ROOT\$siteName"
          $nginxConf = "$env:NGINX_DIR\conf\conf.d\$siteName.conf"
          $backendPort = 5151 + $offset
          $frontendPort = 8080 + $offset

          @"
          instance=$instance
          install_root=$installRoot
          service_name=$serviceName
          site_name=$siteName
          site_dir=$siteDir
          nginx_conf=$nginxConf
          backend_port=$backendPort
          frontend_port=$frontendPort
          first_install=$($firstInstall.ToString().ToLower())
          backend_health=http://127.0.0.1:$backendPort/health
          frontend_health=http://127.0.0.1:$frontendPort/health
          deploy_count=$($deployList.Count)
          "@ | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

          "deploy_list<<EOF"  | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          $deployJson         | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "EOF"               | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

          $names = ($deployList | ForEach-Object { $_.instance }) -join ', '
          Write-Host "fan-out: $($deployList.Count) tenant(s) -> $names"

      - name: Diagnostics
        shell: powershell
        run: |
          whoami
          "MSBuild:  $((Get-Command msbuild.exe -ErrorAction SilentlyContinue).Source)"
          "Node:     $((Get-Command node.exe    -ErrorAction SilentlyContinue).Source)"
          "npm:      $((Get-Command npm.cmd     -ErrorAction SilentlyContinue).Source)"
          "nssm:     $env:NSSM  exists=$(Test-Path $env:NSSM)"
          "nginx:    $env:NGINX_DIR  exists=$(Test-Path "$env:NGINX_DIR\nginx.exe")"
          "MT5 DLL:  $env:MT5_DLL_SOURCE  exists=$(Test-Path $env:MT5_DLL_SOURCE)"
          $svc = Get-Service $env:NGINX_SVC -ErrorAction SilentlyContinue
          "nginx svc: $($svc.Name)=$($svc.Status)"

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch backend dependencies
        shell: powershell
        run: |
          Set-Location backend
          .\scripts\fetch_deps.ps1

      - name: Build backend
        shell: powershell
        run: msbuild backend\ReportTool.sln /p:Configuration=Release /p:Platform=x64 /m /v:m

      - name: Locate backend artifact
        id: art
        shell: powershell
        run: |
          $cands = @(
            'backend\bin\Release\ReportTool.exe',
            'backend\x64\Release\ReportTool.exe',
            'backend\ReportTool\bin\Release\ReportTool.exe',
            'backend\ReportTool\x64\Release\ReportTool.exe'
          )
          $exe = $cands | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $exe) { throw "ReportTool.exe not found" }
          "exe=$exe"      | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "exedir=$(Split-Path $exe)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Built: $exe"

      - name: Build frontend (SPA)
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          Set-Location frontend
          npm install --no-audit --no-fund
          if ($LASTEXITCODE -ne 0) { throw "npm install failed" }
          $env:VITE_API_BASE = ''
          npm run build
          if ($LASTEXITCODE -ne 0) { throw "npm run build failed" }
          if (-not (Test-Path 'dist\index.html')) { throw "frontend dist missing after build" }
          Write-Host "Frontend built: $(Get-Item dist | Select-Object -ExpandProperty FullName)"

      - name: Bootstrap install root (first_time_install only)
        if: steps.cfg.outputs.first_install == 'true'
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $root = '${{ steps.cfg.outputs.install_root }}'
          $port = [int]'${{ steps.cfg.outputs.backend_port }}'

          if (-not (Test-Path $root)) { New-Item -ItemType Directory -Path $root -Force | Out-Null }
          foreach ($sub in 'config','data','data\output','releases','bin') {
            New-Item -ItemType Directory -Path (Join-Path $root $sub) -Force | Out-Null
          }

          # Lock ACL: Admins + SYSTEM only
          $acl = Get-Acl $root
          $acl.SetAccessRuleProtection($true,$false)
          $acl.Access | ForEach-Object { $acl.RemoveAccessRule($_) | Out-Null }
          $admins = New-Object System.Security.AccessControl.FileSystemAccessRule(
            'BUILTIN\Administrators','FullControl','ContainerInherit,ObjectInherit','None','Allow')
          $system = New-Object System.Security.AccessControl.FileSystemAccessRule(
            'NT AUTHORITY\SYSTEM','FullControl','ContainerInherit,ObjectInherit','None','Allow')
          $acl.AddAccessRule($admins); $acl.AddAccessRule($system)
          Set-Acl $root $acl

          # nssm binary (copy from default install)
          $nssmSrc = 'C:\ReportTool\bin\nssm.exe'
          $nssmDst = Join-Path $root 'bin\nssm.exe'
          if (-not (Test-Path $nssmDst)) {
            if (-not (Test-Path $nssmSrc)) { throw "nssm not found at $nssmSrc" }
            Copy-Item $nssmSrc $nssmDst -Force
          }

          # Master key: reuse if exists else generate
          $keyPath = Join-Path $root 'data\KEY.txt'
          if (-not (Test-Path $keyPath)) {
            $bytes = New-Object byte[] 32
            [System.Security.Cryptography.RandomNumberGenerator]::Create().GetBytes($bytes)
            $hex = -join ($bytes | ForEach-Object { $_.ToString('x2') })
            [System.IO.File]::WriteAllText($keyPath, $hex)
            Write-Host "::notice ::Generated new master key for instance '${{ steps.cfg.outputs.instance }}' at $keyPath  (BACK IT UP)"
          } else {
            Write-Host "Master key already present, reusing."
          }
          $masterKey = (Get-Content $keyPath -Raw).Trim()

          # Render config\server.json from repo template
          # Backend now binds loopback only -- nginx is the public-facing layer.
          $tmpl = 'backend\config\server.json'
          if (-not (Test-Path $tmpl)) { throw "$tmpl missing in repo" }
          $cfg = Get-Content $tmpl -Raw | ConvertFrom-Json
          $cfg.port = $port
          $cfg.host = '127.0.0.1'
          $cfg.db_path    = 'data/reportTool.sqlite'
          $cfg.output_dir = 'data/output'
          $cfg.log_path   = 'data/run.log'
          $cfg.dll_dir    = '.'
          ($cfg | ConvertTo-Json -Depth 10) | Set-Content (Join-Path $root 'config\server.json') -Encoding utf8

      - name: Bootstrap nginx (idempotent)
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $nginxDir = $env:NGINX_DIR
          if (-not (Test-Path "$nginxDir\nginx.exe")) { throw "native nginx not found at $nginxDir" }

          $confD = Join-Path $nginxDir 'conf\conf.d'
          if (-not (Test-Path $confD)) { New-Item -ItemType Directory -Path $confD -Force | Out-Null }

          if (-not (Test-Path $env:SITES_ROOT)) { New-Item -ItemType Directory -Path $env:SITES_ROOT -Force | Out-Null }

          # Ensure main nginx.conf has `include conf.d/*.conf;` inside the http block
          $nginxConf = Join-Path $nginxDir 'conf\nginx.conf'
          $content = Get-Content $nginxConf -Raw
          if ($content -notmatch 'include\s+conf\.d/\*\.conf;') {
            # Inject just after `http {` so per-instance configs are loaded.
            $patched = [regex]::Replace($content, '(?m)^http\s*\{\s*$', "http {`n    include conf.d/*.conf;")
            if ($patched -eq $content) { throw "could not patch nginx.conf - no http block found" }
            Copy-Item $nginxConf "$nginxConf.bak.$(Get-Date -Format yyyyMMdd-HHmmss)" -Force
            [System.IO.File]::WriteAllText($nginxConf, $patched)
            Write-Host "Added 'include conf.d/*.conf;' to nginx.conf (backup written)"
          } else {
            Write-Host "nginx.conf already includes conf.d/*.conf"
          }

      - name: Register / update nssm service
        if: steps.cfg.outputs.first_install == 'true'
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $svc  = '${{ steps.cfg.outputs.service_name }}'
          $root = '${{ steps.cfg.outputs.install_root }}'
          $nssm = Join-Path $root 'bin\nssm.exe'
          $exe  = Join-Path $root 'ReportTool.exe'
          $key  = (Get-Content (Join-Path $root 'data\KEY.txt') -Raw).Trim()

          $exists = (& sc.exe query $svc) 2>&1 | Out-String
          if ($exists -notmatch 'SERVICE_NAME') {
            & $nssm install $svc $exe 'config\server.json'
          }
          & $nssm set $svc AppDirectory          $root
          & $nssm set $svc AppParameters         'config\server.json'
          & $nssm set $svc AppStdout             (Join-Path $root 'data\nssm-out.log')
          & $nssm set $svc AppStderr             (Join-Path $root 'data\nssm-err.log')
          & $nssm set $svc AppRotateFiles        1
          & $nssm set $svc AppRotateBytes        10485760
          & $nssm set $svc AppEnvironmentExtra   "REPORTTOOL_MASTER_KEY=$key"
          & $nssm set $svc Start                 SERVICE_AUTO_START
          & $nssm set $svc AppExit Default       Restart
          & $nssm set $svc AppRestartDelay       5000
          & $nssm set $svc DisplayName           "ReportTool Backend (${{ steps.cfg.outputs.instance }})"
          & $nssm set $svc ObjectName            LocalSystem

      #--- Per-tenant deploy fan-out. Reads steps.cfg.outputs.deploy_list (JSON
      #--- array) and runs the backend + frontend swap for each entry. Build
      #--- artifacts (EXE + dist) are produced once by earlier steps and reused
      #--- per tenant. Failure on one tenant attempts a per-tenant rollback,
      #--- then aborts (subsequent tenants are NOT deployed -- re-run the
      #--- workflow to retry once the underlying issue is fixed).
      - name: Deploy to tenants
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $exeSrc   = '${{ steps.art.outputs.exe }}'
          $exeDir   = '${{ steps.art.outputs.exedir }}'
          $distSrc  = Join-Path $env:GITHUB_WORKSPACE 'frontend\dist'
          $nginxExe = Join-Path $env:NGINX_DIR 'nginx.exe'
          $tmplPath = Join-Path $env:GITHUB_WORKSPACE 'frontend\nginx.template.conf'

          if (-not (Test-Path $distSrc)) { throw "frontend dist missing: $distSrc" }
          if (-not (Test-Path $tmplPath)) { throw "nginx template missing: $tmplPath" }

          $deployJson = @'
          ${{ steps.cfg.outputs.deploy_list }}
          '@
          $tenants = $deployJson | ConvertFrom-Json
          if ($tenants -isnot [array]) { $tenants = @($tenants) }
          $tag = "$(Get-Date -Format yyyyMMdd-HHmmss)-$($env:GITHUB_SHA.Substring(0,7))"

          $deployed = @()
          foreach ($t in $tenants) {
             $instance = [string]$t.instance
             $offset   = [int]$t.port_offset
             $suffix   = if ($instance -eq 'default') { '' } else { "-$instance" }
             $root     = "C:\ReportTool$suffix"
             $svc      = "ReportTool$suffix"
             $siteName = "reporttool-$instance"
             $siteDir  = "$env:SITES_ROOT\$siteName"
             $confPath = "$env:NGINX_DIR\conf\conf.d\$siteName.conf"
             $bePort   = 5151 + $offset
             $fePort   = 8080 + $offset
             $beHealth = "http://127.0.0.1:$bePort/health"
             $feHealth = "http://127.0.0.1:$fePort/health"
             $nssm     = Join-Path $root 'bin\nssm.exe'

             Write-Host "=============================================================="
             Write-Host "===== Tenant '$instance' (root=$root, be=$bePort, fe=$fePort)"
             Write-Host "=============================================================="

             if (-not (Test-Path $root)) {
                throw "[$instance] install root missing: $root -- run workflow_dispatch with instance=$instance and first_time_install=true to bootstrap"
             }

             #--- Backend deploy --------------------------------------------
             try { & $nssm stop $svc 2>$null | Out-Null }
             catch { Write-Host "[$instance] nssm stop skipped: $($_.Exception.Message)" }

             #--- Keep server.json's `port` in sync with the tenant's offset.
             #--- Without this, changing port_offset in tenants.json only
             #--- updates nginx and breaks the backend (which keeps listening
             #--- on the old port). Other fields stay untouched.
             $cfgPath = Join-Path $root 'config\server.json'
             if (Test-Path $cfgPath) {
                try {
                   $cfg = Get-Content $cfgPath -Raw | ConvertFrom-Json
                   if ([int]$cfg.port -ne $bePort) {
                      Write-Host "[$instance] server.json port $($cfg.port) -> $bePort (sync from tenants.json)"
                      $cfg.port = $bePort
                      ($cfg | ConvertTo-Json -Depth 10) | Set-Content $cfgPath -Encoding utf8
                   }
                } catch {
                   Write-Host "::warning ::[$instance] server.json sync skipped: $($_.Exception.Message)"
                }
             }

             $bk = Join-Path $root "releases\$tag-prev"
             New-Item -ItemType Directory -Path $bk -Force | Out-Null
             $curExe = Join-Path $root 'ReportTool.exe'
             if (Test-Path $curExe) { Copy-Item $curExe (Join-Path $bk 'ReportTool.exe') -Force }

             Copy-Item $exeSrc $curExe -Force

             #--- MT5 DLL: prefer build-output sibling, else fallback.
             $dllDest  = Join-Path $root 'MT5APIManager64.dll'
             $dllBuild = Join-Path $exeDir 'MT5APIManager64.dll'
             if (-not (Test-Path $dllDest)) {
                if      (Test-Path $dllBuild)            { Copy-Item $dllBuild $dllDest -Force }
                elseif  (Test-Path $env:MT5_DLL_SOURCE)  { Copy-Item $env:MT5_DLL_SOURCE $dllDest -Force }
             }

             & $nssm start $svc
             if ($LASTEXITCODE -ne 0) {
                Write-Host "::warning ::[$instance] nssm start exit=$LASTEXITCODE (likely SERVICE_START_PENDING); deferring to /health"
                $global:LASTEXITCODE = 0
             }

             $ok = $false
             for ($i = 0; $i -lt 20; $i++) {
                Start-Sleep -Seconds 2
                try {
                   $r = Invoke-WebRequest $beHealth -UseBasicParsing -TimeoutSec 3
                   if ($r.StatusCode -eq 200) { $ok = $true; break }
                } catch { }
             }
             if (-not $ok) {
                Write-Host "[$instance] backend /health failed -- rolling back"
                try { & $nssm stop $svc 2>$null | Out-Null } catch { }
                $bkExe = Join-Path $bk 'ReportTool.exe'
                if (Test-Path $bkExe) {
                   Copy-Item $bkExe $curExe -Force
                   & $nssm start $svc
                   if ($LASTEXITCODE -ne 0) { $global:LASTEXITCODE = 0 }
                }
                throw "[$instance] backend deploy rolled back"
             }
             Write-Host "[$instance] Backend OK ($svc): $tag @ $beHealth"

             #--- Prune old backups (keep last 5).
             $rel = Join-Path $root 'releases'
             if (Test-Path $rel) {
                Get-ChildItem $rel -Directory |
                  Sort-Object LastWriteTime -Descending |
                  Select-Object -Skip 5 |
                  Remove-Item -Recurse -Force
             }

             #--- Frontend deploy -------------------------------------------
             New-Item -ItemType Directory -Path $siteDir -Force | Out-Null
             $distDst = Join-Path $siteDir 'dist'
             $distNew = Join-Path $siteDir 'dist.new'
             $distBak = Join-Path $siteDir 'dist.bak'
             if (Test-Path $distNew) { Remove-Item $distNew -Recurse -Force }
             if (Test-Path $distBak) { Remove-Item $distBak -Recurse -Force }

             Copy-Item $distSrc $distNew -Recurse -Force
             if (Test-Path $distDst) { Move-Item $distDst $distBak -Force }
             Move-Item $distNew $distDst -Force

             $rootDir = $distDst -replace '\\','/'
             $confText = (Get-Content $tmplPath -Raw) `
                -replace '\{\{FRONTEND_PORT\}\}', $fePort `
                -replace '\{\{BACKEND_PORT\}\}',  $bePort `
                -replace '\{\{ROOT_DIR\}\}',      $rootDir
             [System.IO.File]::WriteAllText($confPath, $confText)

             & $nginxExe -p "$env:NGINX_DIR\" -t
             if ($LASTEXITCODE -ne 0) {
                Write-Host "[$instance] nginx -t failed -- rolling back"
                Remove-Item $confPath -Force -ErrorAction SilentlyContinue
                if (Test-Path $distBak) {
                   Remove-Item $distDst -Recurse -Force
                   Move-Item $distBak $distDst -Force
                }
                throw "[$instance] nginx config test failed"
             }

             & $nginxExe -p "$env:NGINX_DIR\" -s reload
             if ($LASTEXITCODE -ne 0) {
                Write-Host "[$instance] nginx -s reload failed, restarting service"
                & $env:NSSM restart $env:NGINX_SVC
                if ($LASTEXITCODE -ne 0) { $global:LASTEXITCODE = 0 }
             }

             $ok = $false
             for ($i = 0; $i -lt 20; $i++) {
                Start-Sleep -Seconds 2
                try {
                   $r = Invoke-WebRequest $feHealth -UseBasicParsing -TimeoutSec 3
                   if ($r.StatusCode -eq 200) { $ok = $true; break }
                } catch { }
             }
             if (-not $ok) {
                Write-Host "[$instance] frontend /health failed -- rolling back dist + conf"
                Remove-Item $confPath -Force -ErrorAction SilentlyContinue
                if (Test-Path $distBak) {
                   Remove-Item $distDst -Recurse -Force
                   Move-Item $distBak $distDst -Force
                }
                & $nginxExe -p "$env:NGINX_DIR\" -s reload 2>$null
                throw "[$instance] frontend health failed ($feHealth)"
             }
             if (Test-Path $distBak) { Remove-Item $distBak -Recurse -Force }
             Write-Host "[$instance] Frontend OK (@ :$fePort)"

             $deployed += "$instance (be=$bePort, fe=$fePort)"
          }

          Write-Host ""
          Write-Host "Deployed $($deployed.Count) tenant(s):"
          $deployed | ForEach-Object { Write-Host "  - $_" }

      - name: Summary
        if: always()
        shell: powershell
        run: |
          $deployJson = @'
          ${{ steps.cfg.outputs.deploy_list }}
          '@
          $list = @()
          try {
             $tenants = $deployJson | ConvertFrom-Json
             if ($tenants -isnot [array]) { $tenants = @($tenants) }
             foreach ($t in $tenants) {
                $i = $t.instance
                $o = [int]$t.port_offset
                $list += "- ``$i`` (be=http://127.0.0.1:$([int]$o + 5151)/health, fe=http://127.0.0.1:$([int]$o + 8080)/health)"
             }
          } catch { $list = @('- (could not parse tenant list)') }

          $lines = @(
             '## Deploy result',
             "- tenants deployed: ``$($list.Count)``",
             "- first_time_install: ``${{ steps.cfg.outputs.first_install }}``",
             ''
          ) + $list
          $lines -join "`n" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8
