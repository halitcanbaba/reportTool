server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  # Reverse-proxy backend API to avoid Chrome Private Network Access blocking
  # (browser stays same-origin on :8080, nginx talks to the Windows host).
  # The backend hostname is templated at container start from $REPORTTOOL_BACKEND.
  resolver 127.0.0.11 ipv6=off valid=30s;

  location /api/ {
    proxy_pass         http://host.docker.internal:5151;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_buffering    off;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
    client_max_body_size 50m;
  }

  location = /health {
    proxy_pass         http://host.docker.internal:5151/health;
    proxy_http_version 1.1;
    proxy_set_header   Host $host;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location = /index.html {
    add_header Cache-Control "no-cache";
  }

  location ~* \.(?:js|css|svg|woff2?)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800, immutable";
  }
}
